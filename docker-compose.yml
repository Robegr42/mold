services:
  agent:
    build: .
    image: gensie-mold-team
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PARTICIPANT_PATH=${PARTICIPANT_PATH:-gensie.baseline.OfficialParticipant}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
